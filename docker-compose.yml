version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    PYTHONPATH: "/opt/airflow/src"
    MEDALLION_BASE_PATH: "/opt/airflow/data"
    SPARK_LOCAL_IP: "127.0.0.1"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - medallion-net

services:
  # ──────────────────────────────────────────────
  # PostgreSQL — Airflow metadata + Gold analytics
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./docker/init_gold_db.sql:/docker-entrypoint-initdb.d/init_gold_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - medallion-net

  # ──────────────────────────────────────────────
  # Airflow — Init
  # ──────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        pip install pyspark==3.5.0 delta-spark==3.1.0 requests pandas pyarrow psycopg2-binary &&
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User
          --role Admin --email admin@medallion.local --password admin
      "
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
    restart: "no"

  # ──────────────────────────────────────────────
  # Airflow — Webserver
  # ──────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        pip install pyspark==3.5.0 delta-spark==3.1.0 requests pandas pyarrow psycopg2-binary &&
        airflow webserver
      "
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Airflow — Scheduler
  # ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        pip install pyspark==3.5.0 delta-spark==3.1.0 requests pandas pyarrow psycopg2-binary &&
        airflow scheduler
      "
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Jupyter — Exploração / validação
  # ──────────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_LOCAL_IP: "127.0.0.1"
      MEDALLION_BASE_PATH: "/home/jovyan/data"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
    networks:
      - medallion-net
    command: >
      bash -c "
        pip install delta-spark==3.1.0 psycopg2-binary &&
        start-notebook.sh --NotebookApp.token=''
      "

volumes:
  postgres-db:
  airflow-logs:

networks:
  medallion-net:
    driver: bridge
